<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSplit Pro | 2026</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), 
                              radial-gradient(at 100% 0%, #312e81 0, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 0.85rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .result-card {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .result-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }

        .summary {
            font-size: 0.8rem;
            color: #cbd5e1;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickSplit Pro</h1>
    <p class="subtitle">Smart grouping for singles & couples</p>
    
    <div class="input-group">
        <label for="bill">Bill Total ($)</label>
        <input type="number" id="bill" placeholder="0.00" step="0.01" oninput="calculate()">
    </div>

    <div class="input-row">
        <div class="input-group">
            <label for="singles">Singles</label>
            <input type="number" id="singles" value="1" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="couples">Couples (2-as-1)</label>
            <input type="number" id="couples" value="0" min="0" oninput="calculate()">
        </div>
    </div>

    <div class="input-group">
        <label for="tip">Tip Percentage (%)</label>
        <input type="number" id="tip" value="15" min="0" oninput="calculate()">
    </div>

    <div class="result-card">
        <div class="result-label">Amount per "Wallet"</div>
        <div class="result-value" id="perPerson">$0.00</div>
        <div class="summary" id="summary">Total Wallets: 1</div>
    </div>
</div>

<script>
    function calculate() {
        const bill = parseFloat(document.getElementById('bill').value) || 0;
        const singles = parseInt(document.getElementById('singles').value) || 0;
        const couples = parseInt(document.getElementById('couples').value) || 0;
        const tipPercent = parseFloat(document.getElementById('tip').value) || 0;

        // Total "Wallets" (Paying Entities)
        const totalWallets = singles + couples;

        if (totalWallets <= 0) {
            document.getElementById('perPerson').textContent = "$0.00";
            document.getElementById('summary').textContent = "Total Wallets: 0";
            return;
        }

        const totalWithTip = bill * (1 + (tipPercent / 100));
        const perWallet = totalWithTip / totalWallets;

        document.getElementById('perPerson').textContent = 
            `$${perWallet.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        
        document.getElementById('summary').textContent = `Splitting $${totalWithTip.toFixed(2)} across ${totalWallets} wallets`;
    }
</script>

</body>
</html>
