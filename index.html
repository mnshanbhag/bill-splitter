<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSplit GBP | 2026</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 24px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 0.2rem; }
        .currency-label { text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 1.5rem; }
        .section { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; color: #94a3b8; }
        input, select { width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 5px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; margin-top: 10px; }
        .expense-item { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .balance-row { display: flex; justify-content: space-between; padding: 1rem; border-radius: 14px; margin-bottom: 0.6rem; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        .owed { color: #38bdf8; font-weight: bold; } 
        .owes { color: #f43f5e; font-weight: bold; }
        .total-banner { background: #1e293b; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickSplit Ledger</h1>
    <div class="currency-label">All amounts in GBP (£)</div>

    <div class="section">
        <label>1. Add People (Singles or Couples)</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="newName" placeholder="Name">
            <button class="btn-primary" style="width: 70px;" onclick="addPerson()">Add</button>
        </div>
        <div id="peopleList" style="font-size: 0.8rem; color: #64748b;">Group: (Empty)</div>
    </div>

    <div class="section">
        <label>2. Log an Expense</label>
        <input type="text" id="expDesc" placeholder="What was it for? (e.g. Pub)">
        <input type="number" id="expAmt" placeholder="0.00" step="0.01">
        <label>Who Paid?</label>
        <select id="whoPaid"></select>
        <button class="btn-primary" onclick="addExpense()">Add Bill</button>
    </div>

    <div class="section">
        <div class="total-banner" id="totalPot">Total Spent: £0.00</div>
        <label>Expense History</label>
        <div id="expenseList"></div>
        <button class="btn-secondary" onclick="resetApp()">Clear Everything</button>
    </div>

    <div class="balances">
        <label>The Settlement</label>
        <div id="balanceResults"></div>
    </div>
</div>

<script>
    let participants = [];
    let expenses = [];

    function addPerson() {
        const name = document.getElementById('newName').value.trim();
        if (name && !participants.includes(name)) {
            participants.push(name);
            document.getElementById('newName').value = '';
            updateUI();
        }
    }

    function addExpense() {
        const desc = document.getElementById('expDesc').value;
        const amt = parseFloat(document.getElementById('expAmt').value);
        const payer = document.getElementById('whoPaid').value;

        if (desc && !isNaN(amt) && amt > 0 && payer) {
            expenses.push({ desc, amt, payer });
            document.getElementById('expDesc').value = '';
            document.getElementById('expAmt').value = '';
            updateUI();
        }
    }

    function resetApp() {
        if(confirm("Clear all data?")) {
            participants = [];
            expenses = [];
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('peopleList').textContent = `Group: ${participants.length ? participants.join(', ') : '(Empty)'}`;
        const select = document.getElementById('whoPaid');
        select.innerHTML = participants.map(p => `<option value="${p}">${p}</option>`).join('');

        const list = document.getElementById('expenseList');
        list.innerHTML = expenses.map((e, idx) => `
            <div class="expense-item">
                <span><strong>${e.desc}</strong> <small>(${e.payer})</small></span>
                <span>£${e.amt.toFixed(2)}</span>
            </div>
        `).join('');

        calculateBalances();
    }

    function calculateBalances() {
        if (participants.length === 0) {
            document.getElementById('balanceResults').innerHTML = '';
            document.getElementById('totalPot').textContent = "Total Spent: £0.00";
            return;
        }

        let totalSpent = 0;
        let paidByPerson = {};
        participants.forEach(p => paidByPerson[p] = 0);

        expenses.forEach(e => {
            totalSpent += e.amt;
            paidByPerson[e.payer] += e.amt;
        });

        document.getElementById('totalPot').textContent = `Total Spent: £${totalSpent.toFixed(2)}`;

        // Round the share to 2 decimal places
        const sharePerPerson = Math.round((totalSpent / participants.length) * 100) / 100;
        
        const resultsDiv = document.getElementById('balanceResults');
        resultsDiv.innerHTML = '';

        participants.forEach(p => {
            // Balance = (What they paid) - (Their fair share)
            const balance = paidByPerson[p] - sharePerPerson;
            const row = document.createElement('div');
            row.className = 'balance-row';
            
            const formattedBalance = Math.abs(balance).toFixed(2);

            if (balance > 0.005) { // Owed money
                row.innerHTML = `<span>${p}</span> <span class="owed">is owed £${formattedBalance}</span>`;
            } else if (balance < -0.005) { // Owes money
                row.innerHTML = `<span>${p}</span> <span class="owes">owes £${formattedBalance}</span>`;
            } else {
                row.innerHTML = `<span>${p}</span> <span>Settled Up</span>`;
            }
            resultsDiv.appendChild(row);
        });
    }
</script>

</body>
</html>
