<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSplit Pro | 2026</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .section { background: rgba(0,0,0,0.2); padding: 1.2rem; border-radius: 16px; margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; color: #94a3b8; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; margin-bottom: 0.8rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-copy { background: #10b981; color: white; margin-top: 10px; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: #1e293b; border: 1px solid #334155; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .chip.is-couple { border-color: #f472b6; color: #f472b6; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .delete-btn { background: none; color: #ef4444; width: auto; padding: 0 10px; font-size: 1.2rem; }
        .settlement-card { background: #1e293b; padding: 1rem; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 10px; font-size: 0.9rem; }
        .total-spent { text-align: center; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; color: var(--primary); }
    </small>
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-top:0;">QuickSplit Pro</h2>

    <div class="section">
        <label>1. Add People (Tap for Couple)</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="newName" placeholder="Name..." onkeypress="if(event.key==='Enter') addPerson()">
            <button class="btn-add" style="width: 80px;" onclick="addPerson()">Add</button>
        </div>
        <div id="peopleChips" class="chip-container"></div>
    </div>

    <div class="section">
        <label>2. Log an Expense</label>
        <input type="text" id="expDesc" placeholder="e.g. Pub Round 1">
        <input type="number" id="expAmt" placeholder="£ 0.00" step="0.01">
        <label>Who Paid?</label>
        <select id="whoPaidSelect"></select>
        <button class="btn-add" onclick="addExpense()">Add Bill</button>
    </div>

    <div class="section">
        <div class="total-spent" id="totalDisplay">Total: £0.00</div>
        <div id="historyList"></div>
    </div>

    <div class="section" id="resultsSection" style="display:none;">
        <label>The Settlement</label>
        <div id="p2pResults"></div>
        <button class="btn-copy" onclick="copySummary()">📋 Copy for WhatsApp</button>
        <button style="background:none; color:#64748b; font-size:0.7rem; margin-top:20px;" onclick="location.reload()">Reset All Data</button>
    </div>
</div>

<script>
    let participants = []; 
    let expenses = []; 
    let currentSummaryText = "";

    function addPerson() {
        const input = document.getElementById('newName');
        const name = input.value.trim();
        if (name && !participants.find(p => p.name === name)) {
            participants.push({ name, isCouple: false });
            input.value = '';
            updateUI();
        }
    }

    function toggleCouple(index) {
        participants[index].isCouple = !participants[index].isCouple;
        updateUI();
    }

    function addExpense() {
        const desc = document.getElementById('expDesc').value;
        const amt = parseFloat(document.getElementById('expAmt').value);
        const payer = document.getElementById('whoPaidSelect').value;
        if (desc && amt > 0 && payer) {
            expenses.push({ desc, amt, payer, id: Date.now() });
            document.getElementById('expDesc').value = '';
            document.getElementById('expAmt').value = '';
            updateUI();
        }
    }

    function deleteExpense(id) {
        expenses = expenses.filter(e => e.id !== id);
        updateUI();
    }

    function updateUI() {
        const chipContainer = document.getElementById('peopleChips');
        chipContainer.innerHTML = participants.map((p, i) => `
            <span class="chip ${p.isCouple ? 'is-couple' : ''}" onclick="toggleCouple(${i})">
                ${p.name} ${p.isCouple ? '(x2)' : ''}
            </span>
        `).join('');

        const select = document.getElementById('whoPaidSelect');
        select.innerHTML = participants.map(p => `<option value="${p.name}">${p.name}</option>`).join('');

        const historyList = document.getElementById('historyList');
        let total = 0;
        historyList.innerHTML = expenses.map(e => {
            total += e.amt;
            return `
                <div class="expense-item">
                    <span><strong>${e.desc}</strong> <small>(${e.payer})</small></span>
                    <span>£${e.amt.toFixed(2)} <button class="delete-btn" onclick="deleteExpense(${e.id})">&times;</button></span>
                </div>
            `;
        }).join('');
        document.getElementById('totalDisplay').textContent = `Total: £${total.toFixed(2)}`;

        calculateP2P(total);
    }

    function calculateP2P(totalSpent) {
        if (participants.length === 0 || expenses.length === 0) {
            document.getElementById('resultsSection').style.display = 'none';
            return;
        }
        document.getElementById('resultsSection').style.display = 'block';

        const totalHeads = participants.reduce((sum, p) => sum + (p.isCouple ? 2 : 1), 0);
        const costPerHead = totalSpent / totalHeads;

        let balances = {};
        participants.forEach(p => {
            const myPaid = expenses.filter(e => e.payer === p.name).reduce((sum, e) => sum + e.amt, 0);
            const myShare = costPerHead * (p.isCouple ? 2 : 1);
            balances[p.name] = myPaid - myShare;
        });

        let debtors = [], creditors = [];
        for (let name in balances) {
            if (balances[name] < -0.01) debtors.push({ name, amt: Math.abs(balances[name]) });
            else if (balances[name] > 0.01) creditors.push({ name, amt: balances[name] });
        }

        let transactions = [];
        let summaryLines = [];
        let dArr = [...debtors], cArr = [...creditors];

        while (dArr.length && cArr.length) {
            let d = dArr[0], c = cArr[0];
            let pay = Math.min(d.amt, c.amt);
            transactions.push(`<strong>${d.name}</strong> pays <strong>£${pay.toFixed(2)}</strong> to <strong>${c.name}</strong>`);
            summaryLines.push(`${d.name} pays £${pay.toFixed(2)} to ${c.name}`);
            d.amt -= pay; c.amt -= pay;
            if (d.amt < 0.01) dArr.shift();
            if (c.amt < 0.01) cArr.shift();
        }

        document.getElementById('p2pResults').innerHTML = transactions.map(t => `<div class="settlement-card">${t}</div>`).join('') || "All settled!";
        
        // Prepare summary text
        currentSummaryText = `💰 *QuickSplit Summary*\nTotal Spent: £${totalSpent.toFixed(2)}\n\n*Settlement:*\n` + summaryLines.join('\n');
    }

    function copySummary() {
        navigator.clipboard.writeText(currentSummaryText).then(() => {
            alert("Summary copied! You can now paste it into WhatsApp.");
        });
    }
</script>

</body>
</html>
