<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSplit Pro | 2026</title>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--primary); margin: 0; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #64748b; margin-bottom: 2rem; }
        .section { background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; color: #94a3b8; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
        .chip { background: #334155; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
        .settlement-card { background: #1e293b; padding: 1rem; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 10px; }
        .instruction { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickSplit Pro</h1>
    <div class="subtitle">GBP (£) • Peer-to-Peer Settlement</div>

    <div class="section">
        <label>1. Add Everyone in the Group</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="newName" placeholder="Enter Name..." onkeypress="if(event.key==='Enter') addPerson()">
            <button class="btn-add" style="width: 80px;" onclick="addPerson()">Add</button>
        </div>
        <div id="peopleChips" class="chip-container"></div>
    </div>

    <div class="section">
        <label>2. Add Bills</label>
        <input type="text" id="expDesc" placeholder="Item (e.g. Round 1)">
        <input type="number" id="expAmt" placeholder="£ 0.00" step="0.01">
        <label>Who Paid?</label>
        <select id="whoPaidSelect"></select>
        <button class="btn-add" onclick="addExpense()">Add Bill</button>
    </div>

    <div class="section" id="resultsSection" style="display:none;">
        <label>The Fix (Who owes Whom)</label>
        <div id="p2pResults"></div>
        <button style="background:none; color:#64748b; font-size:0.7rem;" onclick="location.reload()">Reset All Data</button>
    </div>
</div>

<script>
    let people = [];
    let expenses = [];

    function addPerson() {
        const nameInput = document.getElementById('newName');
        const name = nameInput.value.trim();
        if (name && !people.includes(name)) {
            people.push(name);
            nameInput.value = '';
            renderPeople();
        }
    }

    function renderPeople() {
        const container = document.getElementById('peopleChips');
        container.innerHTML = people.map(p => `<span class="chip">${p}</span>`).join('');
        
        const select = document.getElementById('whoPaidSelect');
        select.innerHTML = people.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function addExpense() {
        const desc = document.getElementById('expDesc').value;
        const amt = parseFloat(document.getElementById('expAmt').value);
        const payer = document.getElementById('whoPaidSelect').value;

        if (desc && amt > 0 && payer) {
            expenses.push({ amt, payer });
            document.getElementById('expDesc').value = '';
            document.getElementById('expAmt').value = '';
            document.getElementById('resultsSection').style.display = 'block';
            calculateP2P();
        }
    }

    function calculateP2P() {
        let netBalances = {};
        people.forEach(p => netBalances[p] = 0);

        let totalSpent = 0;
        expenses.forEach(e => {
            totalSpent += e.amt;
            netBalances[e.payer] += e.amt;
        });

        const share = totalSpent / people.length;
        
        // Calculate final net: Positive = Owed money, Negative = Owes money
        let debtors = [];
        let creditors = [];

        people.forEach(p => {
            let balance = netBalances[p] - share;
            if (balance < -0.01) debtors.push({ name: p, amount: Math.abs(balance) });
            else if (balance > 0.01) creditors.push({ name: p, amount: balance });
        });

        // Greedy algorithm to match debtors to creditors
        let transactions = [];
        let d = 0, c = 0;

        while (d < debtors.length && c < creditors.length) {
            let payment = Math.min(debtors[d].amount, creditors[c].amount);
            transactions.push({ from: debtors[d].name, to: creditors[c].name, amount: payment });

            debtors[d].amount -= payment;
            creditors[c].amount -= payment;

            if (debtors[d].amount < 0.01) d++;
            if (creditors[c].amount < 0.01) c++;
        }

        const resultsDiv = document.getElementById('p2pResults');
        resultsDiv.innerHTML = transactions.map(t => `
            <div class="settlement-card">
                <span class="instruction">${t.from}</span> pays 
                <strong>£${t.amount.toFixed(2)}</strong> to 
                <span class="instruction">${t.to}</span>
            </div>
        `).join('') || "Everyone is settled!";
    }
</script>

</body>
</html>
